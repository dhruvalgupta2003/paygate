# Disable blank issues so every report lands in a structured template.
blank_issues_enabled: false

contact_links:
  - name: Security vulnerability
    url: https://github.com/paygate/paygate/security/advisories/new
    about: Report a security issue privately — do not open a public issue. See SECURITY.md.
  - name: Questions and discussion
    url: https://github.com/paygate/paygate/discussions
    about: Ask questions, share ideas, and propose RFCs.
  - name: Documentation
    url: https://paygate.dev/docs
    about: Read the reference docs and architecture guides.
  - name: Discord community
    url: https://paygate.dev/discord
    about: Chat with maintainers and other operators.
