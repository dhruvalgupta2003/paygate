name: Feature request
description: Suggest a new capability or improvement.
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the user problem?
      description: Focus on the problem, not the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Which surfaces does this touch?
      options:
        - label: "@limen/node (npm)"
        - label: "limen (PyPI)"
        - label: Dashboard
        - label: Backend API
        - label: Contracts
        - label: Docs
