# Limen CI — lint, typecheck, unit + integration tests across Node and Python matrix.
#
# Note: action versions are tag-pinned here. A pre-1.0 hardening pass will
# replace every `uses:` reference with a full commit SHA per SLSA L3 guidance.

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  PNPM_VERSION: "9.12.0"
  TURBO_TELEMETRY_DISABLED: "1"
  HUSKY: "0"

jobs:
  # -----------------------------------------------------------------------
  # Node matrix: builds + tests @limen/node, @limen/api, @limen/dashboard
  # -----------------------------------------------------------------------
  node:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        node:
          - "20.18.0"
          - "22.9.0"

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: limen
          POSTGRES_PASSWORD: limen
          POSTGRES_DB: limen_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U limen"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      NODE_ENV: test
      LIMEN_REDIS_URL: redis://localhost:6379
      LIMEN_DATABASE_URL: postgres://limen:limen@localhost:5432/limen_test
      CI: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@${PNPM_VERSION} --activate

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Resolve pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ matrix.node }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-${{ matrix.node }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Upload coverage artifact
        if: matrix.node == '20.18.0'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-node
          path: |
            packages/*/coverage
            apps/*/coverage
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.node == '20.18.0'
        uses: codecov/codecov-action@v6
        with:
          use_oidc: true
          fail_ci_if_error: false
          flags: node
          directory: .
          verbose: false

  # -----------------------------------------------------------------------
  # Python matrix: builds + tests packages/limen-python via hatch
  # -----------------------------------------------------------------------
  python:
    name: Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        python:
          - "3.11"
          - "3.12"

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: limen
          POSTGRES_PASSWORD: limen
          POSTGRES_DB: limen_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U limen"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      LIMEN_REDIS_URL: redis://localhost:6379
      LIMEN_DATABASE_URL: postgres://limen:limen@localhost:5432/limen_test
      PYTHONUNBUFFERED: "1"

    defaults:
      run:
        working-directory: packages/limen-python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install hatch
        run: |
          python -m pip install --upgrade pip
          python -m pip install "hatch>=1.12"

      - name: Hatch env create
        run: hatch env create

      - name: Ruff lint
        run: hatch run lint

      - name: Mypy typecheck
        run: hatch run typecheck

      - name: Pytest
        run: hatch run test

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.python == '3.12'
        uses: codecov/codecov-action@v6
        with:
          use_oidc: true
          fail_ci_if_error: false
          flags: python
          working-directory: packages/limen-python
          verbose: false

  # -----------------------------------------------------------------------
  # Aggregate gate for branch protection
  # -----------------------------------------------------------------------
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs:
      - node
      - python
    if: always()
    permissions:
      contents: read
    steps:
      - name: Verify all required jobs succeeded
        shell: bash
        run: |
          if [[ "${{ needs.node.result }}" != "success" ]]; then
            echo "Node matrix failed"; exit 1
          fi
          if [[ "${{ needs.python.result }}" != "success" ]]; then
            echo "Python matrix failed"; exit 1
          fi
          echo "All CI jobs green"
