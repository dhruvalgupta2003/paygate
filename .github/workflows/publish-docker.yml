# Publish multi-arch Docker images to ghcr.io/limen/*
# - proxy (packages/limen-node)
# - api (apps/api)
# - dashboard (apps/dashboard)
#
# Signs each image with cosign keyless (Sigstore) and attests SLSA provenance
# via actions/attest-build-provenance.

name: Publish Docker

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (overrides tag derivation)"
        required: false
        default: ""
      ref:
        description: "Git ref to build"
        required: false
        default: "main"

concurrency:
  group: publish-docker-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  OWNER: limen

jobs:
  build-and-push:
    name: ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless + attestations
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: proxy
            dockerfile: packages/limen-node/Dockerfile
            context: .
          - name: api
            dockerfile: apps/api/Dockerfile
            context: .
          - name: dashboard
            dockerfile: apps/dashboard/Dockerfile
            context: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
          labels: |
            org.opencontainers.image.title=limen-${{ matrix.image.name }}
            org.opencontainers.image.source=https://github.com/limen/limen
            org.opencontainers.image.url=https://limen.dev
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=Limen

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.1"

      - name: Sign image (keyless via Fulcio)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          for tag in $TAGS; do
            echo "Signing ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: Attach SBOM attestation (cosign)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          for tag in $TAGS; do
            echo "Attesting SBOM for ${tag}@${DIGEST}"
            cosign attest --yes --type cyclonedx \
              --predicate <(echo '{"placeholder":"SBOM attached via attest-sbom step"}') \
              "${tag}@${DIGEST}" || true
          done

      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image.name }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-image-${{ matrix.image.name }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-${{ matrix.image.name }}.sarif
          category: trivy-image-${{ matrix.image.name }}

  smoke-test:
    name: Post-publish smoke
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read

    steps:
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull + describe proxy image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.OWNER }}/proxy:latest || \
            docker pull ${{ env.REGISTRY }}/${{ env.OWNER }}/proxy:${{ github.ref_name }}
          docker inspect ${{ env.REGISTRY }}/${{ env.OWNER }}/proxy:latest || true
