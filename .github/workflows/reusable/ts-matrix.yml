# Reusable: run a script across a Node.js matrix.

name: Reusable · TS Matrix

on:
  workflow_call:
    inputs:
      script:
        description: pnpm script to run (e.g. "lint", "test", "build")
        required: true
        type: string
      node-versions:
        description: JSON array of node versions
        required: false
        type: string
        default: '["20.18.0", "22.9.0"]'
      pnpm-version:
        description: pnpm version
        required: false
        type: string
        default: "9.12.0"
      filter:
        description: Optional pnpm filter
        required: false
        type: string
        default: ""

jobs:
  matrix:
    name: pnpm ${{ inputs.script }} (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        node: ${{ fromJSON(inputs.node-versions) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${{ inputs.pnpm-version }} --activate

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ${{ inputs.script }}${{ inputs.filter != '' && format(' (filter={0})', inputs.filter) || '' }}
        shell: bash
        run: |
          if [[ -n "${{ inputs.filter }}" ]]; then
            pnpm ${{ inputs.script }} --filter '${{ inputs.filter }}'
          else
            pnpm ${{ inputs.script }}
          fi
