# Generate CycloneDX SBOMs for npm, pypi, and docker artefacts on every release.
# Uploads the SBOMs as release assets and attaches them as build provenance.

name: SBOM

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to generate SBOM for"
        required: true

concurrency:
  group: sbom-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  PNPM_VERSION: "9.12.0"
  NODE_VERSION: "20.18.0"

jobs:
  npm-sbom:
    name: npm CycloneDX SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${PNPM_VERSION} --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate CycloneDX SBOM (JSON)
        run: |
          pnpm dlx @cyclonedx/cyclonedx-npm@latest \
            --output-format JSON \
            --output-file limen-node.cdx.json \
            --spec-version 1.5 \
            --package-lock-only false \
            --mc-type application \
            packages/limen-node/package.json

      - name: Attest SBOM provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: limen-node.cdx.json

      - name: Upload SBOM to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: limen-node.cdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pypi-sbom:
    name: PyPI CycloneDX SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write

    defaults:
      run:
        working-directory: packages/limen-python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SBOM tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install "cyclonedx-bom>=4.4" hatch
          python -m pip install .

      - name: Generate CycloneDX SBOM (JSON)
        run: |
          cyclonedx-py environment \
            --output-format JSON \
            --output-file limen-python.cdx.json \
            --schema-version 1.5

      - name: Attest SBOM provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: packages/limen-python/limen-python.cdx.json

      - name: Upload SBOM to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: packages/limen-python/limen-python.cdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-sbom:
    name: Docker SBOM (Syft)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      packages: read
      id-token: write
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        image:
          - proxy
          - api
          - dashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0.17.8

      - name: Generate SBOM via syft
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          image="ghcr.io/limen/${{ matrix.image }}:${version}"
          echo "Generating SBOM for ${image}"
          syft "${image}" \
            -o cyclonedx-json=limen-${{ matrix.image }}-docker.cdx.json \
            -o spdx-json=limen-${{ matrix.image }}-docker.spdx.json

      - name: Attest SBOM provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            limen-${{ matrix.image }}-docker.cdx.json
            limen-${{ matrix.image }}-docker.spdx.json

      - name: Upload SBOM to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: |
            limen-${{ matrix.image }}-docker.cdx.json
            limen-${{ matrix.image }}-docker.spdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
