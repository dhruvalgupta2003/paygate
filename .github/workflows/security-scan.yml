# Limen supply-chain security scanners.
# Covers: secrets (gitleaks), filesystem vulnerabilities (trivy), npm + pip
# dependency audit, OSV-scanner. Results upload SARIF to GitHub Code Scanning.

name: Security Scan

on:
  schedule:
    - cron: "0 10 * * 1" # Every Monday 10:00 UTC
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  PNPM_VERSION: "9.12.0"

jobs:
  # -----------------------------------------------------------------------
  # Secret scanning
  # -----------------------------------------------------------------------
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"
        with:
          config: "" # defaults to .gitleaks.toml if present; else bundled

  # -----------------------------------------------------------------------
  # Filesystem vulnerability scan (Trivy)
  # -----------------------------------------------------------------------
  trivy-fs:
    name: Trivy FS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Trivy config scan (IaC)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          exit-code: "0"

      - name: Upload Trivy config SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

  # -----------------------------------------------------------------------
  # npm dependency audit
  # -----------------------------------------------------------------------
  pnpm-audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${PNPM_VERSION} --activate

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.18.0"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Audit (high severity)
        run: pnpm audit --audit-level=high --prod

  # -----------------------------------------------------------------------
  # Python dependency audit
  # -----------------------------------------------------------------------
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        working-directory: packages/limen-python
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pip-audit + project
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pip-audit>=2.7" hatch
          python -m pip install .

      - name: pip-audit installed environment
        run: pip-audit --strict --disable-pip

      - name: pip-audit via pyproject
        run: pip-audit --strict --progress-spinner=off

  # -----------------------------------------------------------------------
  # OSV scanner (Google OSS-Fuzz advisories, covers npm + pip + go + cargo)
  # -----------------------------------------------------------------------
  osv-scanner:
    name: OSV-Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.5
        with:
          scan-args: |-
            --recursive
            --skip-git
            --format=sarif
            --output=osv.sarif
            ./

      - name: Upload OSV SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: osv.sarif
          category: osv-scanner

  # -----------------------------------------------------------------------
  # Semgrep static analysis (payment/verification surface)
  # -----------------------------------------------------------------------
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/javascript
            p/typescript
            p/python
            p/secrets
          generateSarif: "true"

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # -----------------------------------------------------------------------
  # Aggregate gate for branch protection
  # -----------------------------------------------------------------------
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs:
      - gitleaks
      - trivy-fs
      - pnpm-audit
      - pip-audit
      - osv-scanner
    if: always()
    permissions:
      contents: read
    steps:
      - name: Verify scanners succeeded
        shell: bash
        run: |
          fail=0
          for job in "${{ needs.gitleaks.result }}" "${{ needs.trivy-fs.result }}" "${{ needs.pnpm-audit.result }}" "${{ needs.pip-audit.result }}" "${{ needs.osv-scanner.result }}"; do
            if [[ "$job" != "success" ]]; then fail=1; fi
          done
          if [[ "$fail" -ne 0 ]]; then
            echo "One or more security scanners failed"; exit 1
          fi
          echo "All security scanners green"
