# Mark inactive issues and PRs as stale, close after a grace period.

name: Stale

on:
  schedule:
    - cron: "30 2 * * *" # Daily at 02:30 UTC
  workflow_dispatch:

concurrency:
  group: stale
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  stale:
    name: Stale bot
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Mark stale
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issue policy
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: "stale"
          exempt-issue-labels: "pinned,security,good first issue,help wanted,roadmap,accepted"
          stale-issue-message: |
            This issue has been inactive for 60 days. It will be closed in 14 days
            unless there is further activity.

            If this is still relevant, please add a comment or remove the `stale`
            label. Security reports should never be posted here — see SECURITY.md.
          close-issue-message: |
            Closing due to inactivity. Feel free to reopen with more context.

          # PR policy
          days-before-pr-stale: 30
          days-before-pr-close: 10
          stale-pr-label: "stale"
          exempt-pr-labels: "pinned,security,work-in-progress,awaiting-review"
          stale-pr-message: |
            This PR has been inactive for 30 days. It will be closed in 10 days
            unless there is new activity. Rebase and push, or add a comment to
            keep it open.
          close-pr-message: |
            Closing due to inactivity. Please reopen once you're ready to continue.

          operations-per-run: 100
          remove-stale-when-updated: true
          ascending: true
