<?xml version="1.0" encoding="UTF-8"?>
<!--
  32×32 favicon. Contained square + simplified threshold mark.
  Beam proportions thickened so the gap remains visually present
  even at 16px browser-tab size.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Limen">
  <title>Limen</title>
  <rect width="32" height="32" rx="6" fill="#0A0A0C"/>
  <g fill="#F7F5EF">
    <rect x="7" y="11" width="18" height="3" rx="0.5"/>
    <rect x="7" y="19" width="18" height="4" rx="0.5"/>
  </g>
</svg>
