<?xml version="1.0" encoding="UTF-8"?>
<!--
  PayGate primary mark.

  Concept: two monolithic posts (the gate) flanking a single square
  stamp (the authorization). All three elements share the same 44-unit
  module so the mark reads as a composed system, not a letter.

  Meaning: stand between an agent and an endpoint; refuse passage until
  payment is stamped.

  Construction: 256×256 grid. Three filled rectangles, single color,
  no gradients, no filters.

  Themes automatically via @media (prefers-color-scheme). Surfaces that
  don't honor the query fall back to ink (safe on light paper).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="PayGate">
  <title>PayGate</title>
  <style>
    .pg-mark { fill: #0A0C10; }
    @media (prefers-color-scheme: dark) {
      .pg-mark { fill: #F5F1E8; }
    }
  </style>
  <g class="pg-mark">
    <rect x="44"  y="32"  width="44" height="192" rx="3"/>
    <rect x="168" y="32"  width="44" height="192" rx="3"/>
    <rect x="106" y="106" width="44" height="44"  rx="3"/>
  </g>
</svg>
