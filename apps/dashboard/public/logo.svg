<?xml version="1.0" encoding="UTF-8"?>
<!--
  Limen primary mark.

  Concept: the threshold. Two horizontal beams stacked vertically with
  generous negative space between them. The gap between the beams IS
  the limen — the moment of crossing from one state to another. Top
  beam is the lintel (thinner, restrained). Bottom block is the paid
  domain (anchored, substantive). Together they describe a doorway
  without drawing one.

  Construction: 256×256 grid. Two filled rectangles, single color,
  no gradients, no filters. The proportions are deliberate:
    top:    14 units tall (the lintel)
    gap:    42 units (the limen — exactly 3× the lintel)
    bottom: 24 units tall (anchored, substantive)

  Themes automatically via @media (prefers-color-scheme). Surfaces
  that don't honor the query fall back to ink (safe on light paper).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Limen">
  <title>Limen</title>
  <style>
    .limen-mark { fill: #0A0A0C; }
    @media (prefers-color-scheme: dark) {
      .limen-mark { fill: #F7F5EF; }
    }
  </style>
  <g class="limen-mark">
    <rect x="48" y="88"  width="160" height="14" rx="2"/>
    <rect x="48" y="144" width="160" height="24" rx="2"/>
  </g>
</svg>
