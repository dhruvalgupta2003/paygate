<?xml version="1.0" encoding="UTF-8"?>
<!--
  1200×630 OG / Twitter card.
  Warm paper on ink ground. Mark left, wordmark + tagline center-right,
  technical chips bottom-left, signature bottom-right.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img"
     aria-label="PayGate — x402 paywall for AI agent traffic">
  <title>PayGate — x402 paywall for AI agent traffic</title>

  <rect width="1200" height="630" fill="#0A0C10"/>

  <!-- hairline technical grid -->
  <g stroke="#F5F1E8" stroke-opacity="0.04" stroke-width="1">
    <path d="M 0 105 H 1200 M 0 210 H 1200 M 0 315 H 1200 M 0 420 H 1200 M 0 525 H 1200"/>
    <path d="M 150 0 V 630 M 300 0 V 630 M 450 0 V 630 M 600 0 V 630 M 750 0 V 630 M 900 0 V 630 M 1050 0 V 630"/>
  </g>

  <!-- mark -->
  <g fill="#F5F1E8" transform="translate(80,160) scale(1.2)">
    <rect x="44"  y="32"  width="44" height="192" rx="3"/>
    <rect x="168" y="32"  width="44" height="192" rx="3"/>
    <rect x="106" y="106" width="44" height="44"  rx="3"/>
  </g>

  <!-- wordmark -->
  <text x="450" y="295"
        font-family="'Space Grotesk', 'Inter', system-ui, sans-serif"
        font-weight="500" font-size="128"
        letter-spacing="-0.04em" fill="#F5F1E8">paygate</text>

  <!-- tagline -->
  <text x="455" y="355"
        font-family="'Space Grotesk', 'Inter', system-ui, sans-serif"
        font-weight="400" font-size="34"
        letter-spacing="-0.015em" fill="#9A9A88">pay-per-call for ai agents</text>

  <!-- technical chips -->
  <g font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace"
     font-size="20" fill="#F5F1E8">
    <g transform="translate(80,510)">
      <rect width="148" height="44" fill="none" stroke="#F5F1E8" stroke-opacity="0.22"/>
      <text x="16" y="29" letter-spacing="2">HTTP 402</text>
    </g>
    <g transform="translate(248,510)">
      <rect width="124" height="44" fill="none" stroke="#F5F1E8" stroke-opacity="0.22"/>
      <text x="16" y="29" letter-spacing="2">USDC</text>
    </g>
    <g transform="translate(392,510)">
      <rect width="164" height="44" fill="none" stroke="#F5F1E8" stroke-opacity="0.22"/>
      <text x="16" y="29" letter-spacing="2">EIP-3009</text>
    </g>
    <g transform="translate(576,510)">
      <rect width="204" height="44" fill="none" stroke="#F5F1E8" stroke-opacity="0.22"/>
      <text x="16" y="29" letter-spacing="2">BASE · SOLANA</text>
    </g>
  </g>

  <text x="1120" y="580" text-anchor="end"
        font-family="ui-monospace, 'JetBrains Mono', monospace"
        font-size="16" letter-spacing="3" fill="#7A7A6A">PAYGATE.DEV</text>
</svg>
