<?xml version="1.0" encoding="UTF-8"?>
<!--
  Horizontal lockup: mark + "paygate" wordmark.
  Space Grotesk Medium, Inter fallback. Tight tracking. Lowercase only.
  Auto-themes on surfaces that honor prefers-color-scheme.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 240" role="img" aria-label="paygate">
  <title>paygate</title>
  <style>
    .pg-ink { fill: #0A0C10; }
    .pg-word {
      font-family: 'Space Grotesk', 'Inter', 'InterVariable', system-ui, sans-serif;
      font-weight: 500;
      letter-spacing: -0.04em;
    }
    @media (prefers-color-scheme: dark) {
      .pg-ink { fill: #F5F1E8; }
    }
  </style>

  <!-- mark scaled to ~180 tall, aligned to optical baseline -->
  <g class="pg-ink" transform="translate(20,30) scale(0.7)">
    <rect x="44"  y="32"  width="44" height="192" rx="3"/>
    <rect x="168" y="32"  width="44" height="192" rx="3"/>
    <rect x="106" y="106" width="44" height="44"  rx="3"/>
  </g>

  <text x="220" y="184" class="pg-ink pg-word" font-size="168">paygate</text>
</svg>
