<?xml version="1.0" encoding="UTF-8"?>
<!--
  Limen — horizontal lockup. Mark + wordmark.
  Wordmark: "limen" set in Space Grotesk Medium, lowercase, tight tracking
  (-0.045em). The lowercase form keeps the mark and wordmark in the same
  optical register — neither dominates.
  Auto-themes on surfaces that honor prefers-color-scheme.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" role="img" aria-label="limen">
  <title>limen</title>
  <style>
    .limen-ink { fill: #0A0A0C; }
    .limen-word {
      font-family: 'Space Grotesk', 'Inter', 'InterVariable', system-ui, sans-serif;
      font-weight: 500;
      letter-spacing: -0.045em;
    }
    @media (prefers-color-scheme: dark) {
      .limen-ink { fill: #F7F5EF; }
    }
  </style>

  <!-- mark scaled to ~180 tall, aligned to optical baseline -->
  <g class="limen-ink" transform="translate(20,30) scale(0.7)">
    <rect x="48" y="88"  width="160" height="14" rx="2"/>
    <rect x="48" y="144" width="160" height="24" rx="2"/>
  </g>

  <text x="220" y="180" class="limen-ink limen-word" font-size="168">limen</text>
</svg>
