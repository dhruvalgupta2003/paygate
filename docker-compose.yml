# Limen local development stack.
# Usage: `docker compose up -d`
# Services: postgres, redis, limen-proxy, limen-api, limen-dashboard.

services:
  postgres:
    image: postgres:16-alpine
    container_name: limen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: limen
      POSTGRES_PASSWORD: limen
      POSTGRES_DB: limen
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./apps/api/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U limen"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: limen-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  proxy:
    build:
      context: .
      dockerfile: packages/limen-node/Dockerfile
    container_name: limen-proxy
    restart: unless-stopped
    env_file: .env
    ports:
      - "4021:4021"
      - "9464:9464"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./limen.config.yml:/app/limen.config.yml:ro

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: limen-api
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 4020
    ports:
      - "4020:4020"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: limen-dashboard
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:4020
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
