<?xml version="1.0" encoding="UTF-8"?>
<!--
  32×32 favicon. Contained square + paper mark. Simplified geometry
  so the center stamp remains visible down to 16px browser-tab size.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="PayGate">
  <title>PayGate</title>
  <rect width="32" height="32" rx="6" fill="#0A0C10"/>
  <g fill="#F5F1E8">
    <rect x="5.5"  y="5" width="5.5" height="22" rx="1"/>
    <rect x="21"   y="5" width="5.5" height="22" rx="1"/>
    <rect x="13"   y="13" width="6" height="6"  rx="1"/>
  </g>
</svg>
