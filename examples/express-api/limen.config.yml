# Limen config — Express API example (Base Sepolia testnet).
# Referenced by the sidecar proxy in docker-compose.yml. The in-process
# middleware in src/server.ts mirrors this shape.
version: 1

project:
  name: limen-example-express
  slug: limen-example-express
  description: Minimal Express API protected by Limen on Base Sepolia.
  contact: hello@example.com

wallets:
  base: ${LIMEN_WALLET_BASE_SEPOLIA}

defaults:
  chain: base-sepolia
  currency: USDC
  confirmations: 1
  payment_ttl_seconds: 300
  facilitator: coinbase

endpoints:
  - path: /healthz
    price_usdc: 0
    description: Liveness probe.

  - path: /api/v1/weather/*
    method: [GET]
    price_usdc: 0.001
    description: Per-city weather lookup.
    tags: [weather, b2a]

  - path: /api/v1/score
    method: [POST]
    price_usdc: 0.001
    description: Simple feature-vector scoring endpoint.
    tags: [scoring, b2a]

cache:
  enabled: true
  driver: redis
  default_ttl_seconds: 60
  rules:
    - path: /api/v1/weather/*
      ttl_seconds: 300

rate_limits:
  - scope: wallet
    limit: 600
    window_seconds: 60
  - scope: ip
    limit: 120
    window_seconds: 60

compliance:
  sanctions_screening: true
  geo_blocklist: []
  travel_rule_threshold_usd: 3000

discovery:
  listed: false
  categories: [weather, scoring]

advanced:
  upstream_timeout_ms: 15000
  max_request_body_mb: 5
  trust_proxy: true
