# Limen FastAPI example stack.
# Usage: `cp .env.example .env && docker compose up`
services:
  redis:
    image: redis:7-alpine
    container_name: limen-example-fastapi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: examples/fastapi-api/Dockerfile
    container_name: limen-example-fastapi-api
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy

  proxy:
    image: ghcr.io/limen/proxy:latest
    container_name: limen-example-fastapi-proxy
    restart: unless-stopped
    env_file: .env
    environment:
      LIMEN_REDIS_URL: redis://redis:6379
      LIMEN_UPSTREAM_URL: http://api:3000
    command: ["start", "--config", "/app/limen.config.yml"]
    volumes:
      - ./limen.config.yml:/app/limen.config.yml:ro
    ports:
      - "4021:4021"
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
