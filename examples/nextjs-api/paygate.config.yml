# PayGate config — Next.js example.
# Next.js middleware consumes env vars directly (see middleware.ts); this
# file is kept alongside so you can run a standalone proxy sidecar with the
# same contract: `paygate start --config paygate.config.yml`.
version: 1

project:
  name: paygate-example-nextjs
  slug: paygate-example-nextjs

wallets:
  base: ${PAYGATE_WALLET_BASE_SEPOLIA}

defaults:
  chain: base-sepolia
  currency: USDC
  confirmations: 1
  payment_ttl_seconds: 300
  facilitator: coinbase

endpoints:
  - path: /api/premium/*
    price_usdc: 0.001
    description: Premium endpoint (gated).

rate_limits:
  - scope: wallet
    limit: 600
    window_seconds: 60
