# PayGate config — Solana RPC Gateway example.
# Works with either the in-process middleware in src/index.ts or the drop-in
# proxy (see docker-compose.yml) with `--upstream https://api.devnet.solana.com`.
version: 1

project:
  name: paygate-example-solana-rpc
  slug: paygate-example-solana-rpc
  description: Monetised Solana RPC gateway (devnet).

wallets:
  solana: ${PAYGATE_WALLET_SOLANA_DEVNET}

defaults:
  chain: solana-devnet
  currency: USDC
  confirmations: 1
  payment_ttl_seconds: 300
  facilitator: coinbase

endpoints:
  - path: /rpc
    method: [POST]
    price_usdc: 0.00025
    description: Proxied Solana RPC (getBlockHeight, getBalance, getTransaction).
    tags: [rpc, solana]

  - path: /healthz
    price_usdc: 0

rate_limits:
  - scope: wallet
    limit: 1200
    window_seconds: 60
  - scope: ip
    limit: 300
    window_seconds: 60

cache:
  enabled: false
  driver: memory
  default_ttl_seconds: 0

compliance:
  sanctions_screening: true
  geo_blocklist: []
  travel_rule_threshold_usd: 3000

discovery:
  listed: false
  categories: [rpc, solana]
