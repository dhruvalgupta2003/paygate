[envs.default]
dependencies = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5",
    "ruff>=0.6",
    "mypy>=1.11",
    "respx>=0.21",
    "httpx>=0.27",
]

[envs.default.scripts]
test = "pytest {args:tests}"
lint = "ruff check {args:limen tests}"
format = "ruff format {args:limen tests}"
typecheck = "mypy limen"
all = [
    "format",
    "lint",
    "typecheck",
    "test",
]

[envs.test]
dependencies = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5",
    "respx>=0.21",
    "httpx>=0.27",
]

[[envs.test.matrix]]
python = ["3.11", "3.12"]
